<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>OneSports // TSN Stream</title>
<!-- Using Shaka Player 5.1.8 for best DASH and DRM support -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<style>
/* Base Styles */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Hide Default Shaka Spinner */
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}

/* ---------- Custom loading spinner ---------- */
#loader{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9;opacity:0;pointer-events:none;transition:opacity .2s}
#loader.on{opacity:1}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#f5b301;border-radius:50%;animation:sp .8s linear infinite}
#loaderTxt{color:#fff;font-size:13px;letter-spacing:.5px;opacity:.85}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- OneSports watermark (bottom right corner) ---------- */
#wm{
  position:absolute;
  right:20px;
  bottom:20px;
  z-index:5;
  pointer-events:none;
  display:flex;
  align-items:center;
  opacity:0.65;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  transition:opacity .25s, bottom .25s, right .25s;
}
.wm-text {
  font-family: 'Orbitron', 'Segoe UI', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 1px;
  white-space: nowrap;
  text-transform: uppercase;
}
.wm-text .one { color: #ffffff; }
.wm-text .sports { color: #f5b301; }

/* Lift watermark above the control bar when controls are visible */
.controls-visible #wm {
  bottom: 65px; 
  opacity: 0.4;
}

/* Small screens: shrink watermark */
@media (max-width:600px){
  .wm-text{font-size:15px}
}
</style>
</head>
<body>
<div class="shaka-video-container" id="pc">
  <!-- Video element -->
  <video id="v" autoplay playsinline muted preload="metadata"></video>
  
  <!-- Watermark -->
  <div id="wm">
    <div class="wm-text"><span class="one">One</span><span class="sports">Sports</span></div>
  </div>
  
  <!-- Loading spinner -->
  <div id="loader"><div class="spin"></div><div id="loaderTxt">Loading your stream…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
/* =======================================================
   STREAM AND DRM CONFIGURATION 
======================================================= */
const STREAM_URL = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd";

// 🔓 Decryption keys extracted from source:
const KEY_ID = "14eeabf30c14b7fbf3008c03099ce011";
const KEY = "17d2ac8dbc5429bd70af3433aa12158d";
/* ======================================================= */

function onPlayerErrorEvent(event) {
  onPlayerError(event.detail);
}

function onPlayerError(error) {
  let errorMsg = `Error code: ${error.code}`;
  if (error.category === shaka.util.Error.Category.NETWORK) {
    errorMsg += ` (Network Error).`;
  } else if (error.category === shaka.util.Error.Category.DRM) {
    errorMsg += ` (DRM Error - Did you forget to add the decryption key?).`;
  } else if (error.category === shaka.util.Error.Category.MANIFEST) {
    errorMsg += ` (Manifest Error).`;
  }
  if (error.data && error.data.length > 0) {
    errorMsg += ` | Details: ${error.data.join(', ')}`;
  }
  console.error(`CRITICAL ERROR: ${errorMsg}`);
  
  if (error.code === 6001 || error.code === 6013 || KEY === "PUT_YOUR_DECRYPTION_KEY_HERE") {
      alert("DRM Error: This stream is encrypted. You must provide the correct Decryption Key in the HTML code.");
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) {
    console.error('Browser not supported!');
    return;
  }

  const videoEl = document.getElementById('v');
  const container = document.getElementById('pc');
  const loader = document.getElementById('loader');
  const loaderTxt = document.getElementById('loaderTxt');

  const player = new shaka.Player();
  await player.attach(videoEl);

  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements: [
      'play_pause', 'mute', 'volume', 'time_and_duration',
      'spacer', 'picture_in_picture', 'quality', 'fullscreen'
    ],
    seekBarColors: { base: 'rgba(255,255,255,0.3)', buffered: 'rgba(255,255,255,0.6)', played: '#f5b301' },
    fadeDelay: 3,
    addBigPlayButton: true,
  });

  player.addEventListener('error', onPlayerErrorEvent);

  player.addEventListener('buffering', (e) => {
    loader.classList.toggle('on', e.buffering);
    if (e.buffering) loaderTxt.textContent = "Loading your stream…";
  });

  const controlsContainer = container.querySelector('.shaka-controls-container');
  if (controlsContainer) {
    const observer = new MutationObserver(() => {
      container.classList.toggle('controls-visible', controlsContainer.getAttribute('shown') !== null);
    });
    observer.observe(controlsContainer, { attributes: true, attributeFilter: ['shown'] });
  }

  const playerConfig = {
    abr: {
      enabled: true, 
      defaultBandwidthEstimate: 10000000, 
    },
    manifest: {
      defaultPresentationDelay: 10,
      dash: { ignoreSuggestedPresentationDelay: false, ignoreMinBufferTime: false, autoCorrectDrift: true }
    },
    streaming: {
      bufferingGoal: 10,
      rebufferingGoal: 2,
      bufferBehind: 15,
      lowLatencyMode: false,
      jumpLargeGaps: true,
      retryParameters: {
        maxAttempts: 5,
        baseDelay: 1000,
        timeout: 20000
      }
    }
  };

  // 🔓 Apply DRM Keys
  if (KEY_ID && KEY && KEY !== "PUT_YOUR_DECRYPTION_KEY_HERE") {
    playerConfig.drm = {
      clearKeys: {
        [KEY_ID]: KEY
      }
    };
  }

  player.configure(playerConfig);

  loader.classList.add('on');
  try {
    await player.load(STREAM_URL);
    loader.classList.remove('on');
    
    if (player.isLive()) {
      videoEl.currentTime = player.seekRange().end;
    }

    try {
      await videoEl.play();
    } catch (e) {
      console.warn('Autoplay prevented by browser:', e);
    }
  } catch (e) {
    onPlayerErrorEvent({detail: e});
    loader.classList.remove('on');
  }
});
</script>
</body>
</html>
