<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OneSports Premium Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<style>
html,body{margin:0;height:100%;background:#000;font-family:Inter,Arial,sans-serif;overflow:hidden}
#player{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain;background:#000}
#loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0008;z-index:10}
.spin{width:52px;height:52px;border:4px solid #444;border-top-color:#f5c542;border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#brand{position:absolute;right:18px;bottom:18px;color:#fff;font-weight:800;font-size:18px;opacity:.92;text-shadow:0 2px 10px #000;pointer-events:none}
#brand span{color:#f5c542}
#live{position:absolute;left:18px;top:18px;background:#c00;color:#fff;padding:7px 12px;border-radius:30px;font-weight:700;font-size:12px}
#speed,#quality{position:absolute;top:18px;background:#111c;color:#fff;padding:6px 10px;border-radius:20px;font-size:12px}
#speed{right:18px}#quality{right:105px}
</style>
</head>
<body>
<div id="player" class="shaka-video-container">
<video id="video" autoplay playsinline controls></video>
<div id="loader"><div class="spin"></div></div>
<div id="live">● LIVE</div>
<div id="quality">AUTO</div>
<div id="speed">-- Mbps</div>
<div id="brand">One<span>Sports</span></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
const STREAM="https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8";
const video=document.getElementById("video");
const loader=document.getElementById("loader");
const quality=document.getElementById("quality");
const speed=document.getElementById("speed");
let player;
async function init(){
 shaka.polyfill.installAll();
 if(!shaka.Player.isBrowserSupported()){alert("Browser not supported");return;}
 player=new shaka.Player(video);
 const ui=new shaka.ui.Overlay(player,document.getElementById("player"),video);
 ui.configure({
  controlPanelElements:["play_pause","rewind","fast_forward","mute","volume","time_and_duration","spacer","quality","picture_in_picture","playback_rate","fullscreen"],
  overflowMenuButtons:["quality","language","captions","playback_rate"],
  seekBarColors:{base:"#333",buffered:"#777",played:"#f5c542"}
 });
 player.configure({
  abr:{enabled:true,defaultBandwidthEstimate:15000000},
  streaming:{
   lowLatencyMode:true,bufferingGoal:20,rebufferingGoal:2,bufferBehind:20,
   retryParameters:{maxAttempts:10,baseDelay:1000,backoffFactor:2}
  }
 });
 player.addEventListener("buffering",e=>loader.style.display=e.buffering?"flex":"none");
 player.addEventListener("adaptation",()=>{
   const t=player.getVariantTracks().find(x=>x.active);
   if(t) quality.textContent=t.height?t.height+"P":"AUTO";
 });
 player.addEventListener("error",()=>setTimeout(loadStream,3000));
 await loadStream();
 video.volume=localStorage.getItem("vol")||1;
 video.addEventListener("volumechange",()=>localStorage.setItem("vol",video.volume));
 document.addEventListener("keydown",e=>{
   if(e.key==="f") document.fullscreenElement?document.exitFullscreen():document.getElementById("player").requestFullscreen();
   if(e.key==="m") video.muted=!video.muted;
   if(e.key==="ArrowRight") video.currentTime+=10;
   if(e.key==="ArrowLeft") video.currentTime-=10;
   if(e.code==="Space"){e.preventDefault();video.paused?video.play():video.pause();}
 });
 video.ondblclick=()=>document.fullscreenElement?document.exitFullscreen():document.getElementById("player").requestFullscreen();
}
async function loadStream(){
 loader.style.display="flex";
 try{await player.load(STREAM);loader.style.display="none";video.play().catch(()=>{});}catch(e){loader.style.display="none";}
}
let last=performance.now();
let bytes=0;
setInterval(()=>{
 const b=performance.getEntriesByType("resource").reduce((a,r)=>a+(r.transferSize||0),0);
 const now=performance.now();
 const mbps=((b-bytes)*8/1000000)/((now-last)/1000);
 bytes=b;last=now;
 speed.textContent=(mbps>0?mbps.toFixed(1):"--")+" Mbps";
},3000);
init();
</script>
</body>
</html>
