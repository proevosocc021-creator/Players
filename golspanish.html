<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>OneSports // Gol TV Spanish</title>

<!-- Shaka Player 5.1.8 (best DASH + DRM support) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
<!-- Orbitron font for the watermark -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
/* ---------- Base ---------- */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Hide default Shaka spinner, use our own */
.shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
.shaka-controls-container button{color:#fff!important}

/* ---------- Premium Transparent Loader ---------- */
#loader{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:99;opacity:0;pointer-events:none;transition:opacity .4s ease}
#loader.on{opacity:1}
.spinner-container{position:relative;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.ring-1{position:absolute;width:100%;height:100%;border:4px solid transparent;border-top-color:#f5b301;border-right-color:#f5b301;border-radius:50%;animation:spin 1.2s cubic-bezier(0.5,0,0.5,1) infinite;filter:drop-shadow(0 0 10px rgba(245,179,1,.8))}
.ring-2{position:absolute;width:60%;height:60%;border:4px solid transparent;border-bottom-color:#ffffff;border-left-color:#ffffff;border-radius:50%;animation:spin-reverse .9s cubic-bezier(0.5,0,0.5,1) infinite;filter:drop-shadow(0 0 10px rgba(255,255,255,.8))}
#loaderTxt{color:#fff;font-size:14px;letter-spacing:.5px;opacity:.85;font-weight:600}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes spin-reverse{0%{transform:rotate(360deg)}100%{transform:rotate(0deg)}}

/* ---------- Status / error overlay ---------- */
#status{position:absolute;inset:0;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:12;text-align:center;padding:24px}
#status.on{display:flex}
#status h2{color:#fff;font-size:18px;font-weight:600}
#status p{color:#bbb;font-size:13px;max-width:420px;line-height:1.5}
#status button{background:#f5b301;color:#111;border:0;padding:11px 26px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.5px}
#status button:hover{background:#ffc21f}


/* ---------- OneSports Logo Watermark ---------- */
#wm{
  position:absolute;
  right:20px;
  bottom:20px;
  z-index:5;
  pointer-events:none;
  display:flex;
  align-items:center;
  opacity:0.65;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  transition:opacity .25s, bottom .25s, right .25s;
}
.wm-text {
  font-family: 'Orbitron', 'Segoe UI', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 1px;
  white-space: nowrap;
  text-transform: uppercase;
}
.wm-text .one { color: #ffffff; }
.wm-text .sports { color: #f5b301; }

/* Lift watermark above the control bar when controls are visible */
.controls-visible #wm{bottom:65px;opacity:0.4;}

/* Small screens: shrink watermark */
@media (max-width:600px){
  .wm-text{font-size:15px}
}
</style>
</head>
<body>
<div class="shaka-video-container" id="pc">
  <!-- Video -->
  <video id="v" autoplay playsinline muted preload="auto"></video>


  <!-- Watermark -->
  <div id="wm">
    <div class="wm-text"><span class="one">One</span><span class="sports">Sports</span></div>
  </div>

  <!-- Loading spinner -->
  <div id="loader">
    <div class="spinner-container">
      <div class="ring-1"></div>
      <div class="ring-2"></div>
    </div>
    <div id="loaderTxt">Loading your stream…</div>
  </div>

  <!-- Status / error overlay -->
  <div id="status">
    <h2 id="statusTitle">Connection lost</h2>
    <p id="statusMsg">We're trying to reconnect to the stream.</p>
    <button id="statusBtn">Reload</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
/* =======================================================
   >>> TEST SWITCH <
   TEST_MODE = true  -> free public DASH sample (no DRM)
   TEST_MODE = false -> real OneSports live stream.
======================================================= */
const TEST_MODE = false;

/* ---------- Stream + DRM ---------- */
const REAL_STREAM_URL = "https://dmbgaz4xf6jyh.cloudfront.net/live-stream-dai/69690cfcce0dc031830e7c1a/123a264b71764485bd49eca2d552cf33/d97743de3620a865848fff7a9de14dda1bf2409d/session/5795ce7e-bcd4-4de8-8e2d-4d21d4567a37/manifest.mpd?aid=688aae6d61c87d6274c05065&dnt=true&access_token=63ey9SOpQeHBRfWJYQLXQjelQc0QM1HXmlHp4iZrH8UCOCM8QtGIGg1sEEPJH0R0yXktUEXdLeB&uid=Knx65GY6UbaWSADZybEvf6m5MvqNIuNs&sid=bwRy9BgSc4RFeVhYh52hVIY8uPsJ4v4d&pid=A0xT1VnepBvKKqyeyRNtNkZBmHBrNNZM&ref=ditu.caracoltv.com&ext_pb=0&es=dmbgaz4xf6jyh.cloudfront.net&proto=https&pz=us&xr=us-east-2&manifestfilter=video_height:480-1080";
const REAL_KEY_ID = "1c6bfd8d1cdd4df69ea5fc4dd2f025bb";
const REAL_KEY    = "b6fd90027dac7a94a9461f8b2638cbb4";

const TEST_STREAM_URL = "https://storage.googleapis.com/shaka-demo-assets/angel-one/dash.mpd";

const STREAM_URL = TEST_MODE ? TEST_STREAM_URL : REAL_STREAM_URL;
const KEY_ID     = TEST_MODE ? "" : REAL_KEY_ID;
const KEY        = TEST_MODE ? "" : REAL_KEY;

/* ---------- Tunables (safe to adjust) ---------- */
const PRESENTATION_DELAY   = 10;   // 10 seconds behind live edge
const BUFFERING_GOAL       = 10;   // exactly 10 seconds of forward buffer
const REBUFFERING_GOAL     = 2;    // seconds of buffer needed before resuming after a stall
const BUFFER_BEHIND        = 10;   // seconds of buffer kept behind playhead
const LIVE_EDGE_TOLERANCE  = 20;   // if we fall more than this behind live, badge shows "BEHIND"
const MAX_AUTO_RELOADS     = 6;    // auto-reconnect attempts before giving up
/* ======================================================= */

let player, videoEl, container, loader, loaderTxt, statusEl, statusTitle, statusMsg, statusBtn;
let autoReloads = 0;
let reloadTimer = null;

/* ---------- Rotating Loading Sentences ---------- */
const loadingPhrases = [
  "Connecting to live server...",
  "Optimizing video quality...",
  "Fetching secure stream data...",
  "Almost ready...",
  "Bypassing geo-restrictions...",
  "Loading your stream..."
];
let phraseTimer = null;

function startPhrases() {
  if (phraseTimer) return;
  let i = 0;
  phraseTimer = setInterval(() => {
    i = (i + 1) % loadingPhrases.length;
    if (loader.classList.contains("on") && autoReloads === 0) {
      loaderTxt.textContent = loadingPhrases[i];
    }
  }, 2500);
}
function stopPhrases() {
  if (phraseTimer) { clearInterval(phraseTimer); phraseTimer = null; }
}

/* ---------- Error handling ---------- */
function describeError(error){
  let msg = `Error code: ${error.code}`;
  if (!error.category) return msg;
  if (error.category === shaka.util.Error.Category.NETWORK)  msg += " (Network)";
  else if (error.category === shaka.util.Error.Category.DRM) msg += " (DRM / decryption key)";
  else if (error.category === shaka.util.Error.Category.MANIFEST) msg += " (Manifest)";
  return msg;
}

function onPlayerErrorEvent(event){ handleError(event.detail); }

function handleError(error){
  console.error("PLAYER ERROR:", describeError(error), error);
  if (error.code === 6001 || error.code === 6007 || error.code === 6013){
    showStatus("Stream is encrypted", "The decryption key is missing or incorrect. Please check the player configuration.", "Retry");
    return;
  }
  scheduleAutoReload();
}

/* ---------- Auto-reconnect with backoff ---------- */
function scheduleAutoReload(){
  if (reloadTimer) return;
  if (autoReloads >= MAX_AUTO_RELOADS){
    showStatus("Can't reach the stream", "The stream may be offline or your connection dropped. Tap reload to try again.", "Reload");
    return;
  }
  autoReloads++;
  const delay = Math.min(1000 * Math.pow(1.6, autoReloads), 8000);
  loaderTxt.textContent = `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})`;
  loader.classList.add("on");
  reloadTimer = setTimeout(async () => {
    reloadTimer = null;
    await loadStream();
  }, delay);
}

function showStatus(title, msg, btnText){
  loader.classList.remove("on");
  statusTitle.textContent = title;
  statusMsg.textContent = msg;
  statusBtn.textContent = btnText || "Reload";
  statusEl.classList.add("on");
}
function hideStatus(){ statusEl.classList.remove("on"); }

/* ---------- Live-edge helpers ---------- */
function seekToLive(){
  try{
    if (player.isLive()){
      videoEl.currentTime = player.seekRange().end;
      videoEl.play().catch(()=>{});
    }
  }catch(e){}
}




/* ---------- Keyboard shortcuts ---------- */
function bindKeys(){
  document.addEventListener("keydown", (e) => {
    switch (e.key.toLowerCase()){
      case " ": case "k": e.preventDefault(); videoEl.paused ? videoEl.play() : videoEl.pause(); break;
      case "f": document.fullscreenElement ? document.exitFullscreen() : container.requestFullscreen(); break;
      case "m": videoEl.muted = !videoEl.muted; break;
      case "l": seekToLive(); break;
      case "arrowup":   e.preventDefault(); videoEl.volume = Math.min(1, videoEl.volume + 0.1); break;
      case "arrowdown": e.preventDefault(); videoEl.volume = Math.max(0, videoEl.volume - 0.1); break;
    }
  });
}

/* ---------- Load / reload the stream ---------- */
async function loadStream(){
  hideStatus();
  loaderTxt.textContent = autoReloads ? `Reconnecting… (${autoReloads}/${MAX_AUTO_RELOADS})` : "Loading your stream…";
  loader.classList.add("on");
  try{
    await player.load(STREAM_URL);
    autoReloads = 0;
    loader.classList.remove("on");
    stopPhrases();
    hideStatus();
    if (player.isLive()) seekToLive();
    try { await videoEl.play(); } catch(e){ console.warn("Autoplay prevented:", e); }
  }catch(e){
    handleError(e);
  }
}

/* ---------- Boot ---------- */
document.addEventListener("DOMContentLoaded", async () => {
  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()){
    document.body.innerHTML = "<div style='color:#fff;padding:40px;font:16px sans-serif'>Your browser is not supported. Please use an up-to-date Chrome, Edge or Firefox.</div>";
    return;
  }

  videoEl     = document.getElementById("v");
  container   = document.getElementById("pc");
  loader      = document.getElementById("loader");
  loaderTxt   = document.getElementById("loaderTxt");
  statusEl    = document.getElementById("status");
  statusTitle = document.getElementById("statusTitle");
  statusMsg   = document.getElementById("statusMsg");
  statusBtn   = document.getElementById("statusBtn");

  player = new shaka.Player();
  await player.attach(videoEl);

  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements: [
      'play_pause', 'mute', 'volume', 'time_and_duration',
      'spacer', 'picture_in_picture', 'quality', 'fullscreen'
    ],
    seekBarColors: { base:'rgba(255,255,255,0.3)', buffered:'rgba(255,255,255,0.65)', played:'#f5b301' },
    fadeDelay: 2,
    addBigPlayButton: true,
    doubleClickForFullscreen: true,
    tapSeekDistance: 10,
  });

  /* ---------- Player configuration ---------- */
  const playerConfig = {
    abr: {
      enabled: true,
      defaultBandwidthEstimate: 8000000,   // 8 Mbps start -> reaches 1080p fast on good connections
      switchInterval: 8,
      restrictToElementSize: true,         // fullscreen on a 1080p+ screen still serves 1080p; saves data on phones
    },
    manifest: {
      defaultPresentationDelay: PRESENTATION_DELAY,
      dash: { ignoreSuggestedPresentationDelay: false, ignoreMinBufferTime: false, autoCorrectDrift: true },
      retryParameters: { maxAttempts: 6, baseDelay: 600, backoffFactor: 1.6, timeout: 30000 }
    },
    streaming: {
      bufferingGoal:   BUFFERING_GOAL,
      rebufferingGoal: REBUFFERING_GOAL,
      bufferBehind:    BUFFER_BEHIND,
      lowLatencyMode:  false,              // main buffering fix
      jumpLargeGaps:   true,
      gapDetectionThreshold: 0.5,
      stallEnabled:    true,
      stallThreshold:  1,
      stallSkip:       0.1,
      retryParameters: { maxAttempts: 8, baseDelay: 500, backoffFactor: 1.6, fuzzFactor: 0.5, timeout: 30000 }
    }
  };

  if (KEY_ID && KEY){
    playerConfig.drm = { clearKeys: { [KEY_ID]: KEY } };
  }
  player.configure(playerConfig);

  /* ---------- Events ---------- */
  player.addEventListener("error", onPlayerErrorEvent);
  player.addEventListener("buffering", (e) => {
    loader.classList.toggle("on", e.buffering);
    if (e.buffering && autoReloads === 0) {
      loaderTxt.textContent = "Loading your stream…";
      startPhrases();
    } else if (!e.buffering) {
      stopPhrases();
    }
  });
  videoEl.addEventListener("playing", () => { loader.classList.remove("on"); stopPhrases(); hideStatus(); });
  videoEl.addEventListener("waiting", () => { loader.classList.add("on"); startPhrases(); });

  const controlsContainer = container.querySelector(".shaka-controls-container");
  if (controlsContainer){
    new MutationObserver(() => {
      container.classList.toggle("controls-visible", controlsContainer.getAttribute("shown") !== null);
    }).observe(controlsContainer, { attributes:true, attributeFilter:["shown"] });
  }

  statusBtn.addEventListener("click", () => { autoReloads = 0; loadStream(); });
  container.addEventListener("contextmenu", (e) => e.preventDefault());

  bindKeys();
  await loadStream();
});
</script>
</body>
</html>
